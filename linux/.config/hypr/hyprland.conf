### Variables

# Keep the Sway muscle memory: Alt plus Vim direction keys.
$mod = ALT
$term = kitty
$menu = vicinae toggle

### Monitors and environment

monitor = , preferred, auto, 1

env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Adwaita
env = HYPRCURSOR_SIZE,24
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = QT_QPA_PLATFORM,wayland;xcb
env = MOZ_ENABLE_WAYLAND,1

### Input

input {
    kb_model = mac
    kb_layout = us
    kb_variant = intl
    kb_options = numlock:enable
    follow_mouse = 0

    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = false
    }
}

### Look and feel

general {
    gaps_in = 5
    gaps_out = 12
    border_size = 2
    col.active_border = rgba(cba6f7ff) rgba(f5c2e7ff) 45deg
    col.inactive_border = rgba(45475acc)
    resize_on_border = true
    layout = dwindle
}

decoration {
    rounding = 12
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 0.94
    fullscreen_opacity = 1.0
    dim_special = 0.25

    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        vibrancy = 0.16
    }

    shadow {
        enabled = true
        range = 24
        render_power = 3
        color = rgba(11111bdd)
    }
}

animations {
    enabled = true

    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0, 0.35, 1
    bezier = workspaceSlide, 0.76, 0, 0.24, 1

    animation = windows, 1, 2.5, easeOutQuint, popin 92%
    animation = windowsOut, 1, 2, easeInOutCubic, popin 92%
    animation = border, 1, 3, easeOutQuint
    animation = fade, 0
    animation = workspaces, 1, 3, workspaceSlide, slide
    animation = specialWorkspace, 1, 2.5, easeOutQuint, slidevert
}

dwindle {
    preserve_split = true
    smart_split = false
}

group {
    col.border_active = rgba(cba6f7ff)
    col.border_inactive = rgba(45475acc)

    groupbar {
        enabled = true
        font_family = JetBrains Mono Nerd Font
        font_size = 10
        gradients = true
        height = 22
        col.active = rgba(cba6f7ff)
        col.inactive = rgba(313244ee)
        text_color = rgba(1e1e2eff)
    }
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}

### Startup

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = ibus-daemon --xim --daemonize -r
exec-once = ~/bin/bgchange_wayland
exec-once = wlsunset -l 10.5 -L -66.8 -T 5351 -t 2000 -g 0.95
exec-once = swaync
exec-once = vicinae server
exec-once = waybar
exec-once = hypridle
exec-once = ~/bin/battery-monitor-launcher

### Key bindings

# Basics
bind = $mod, Return, exec, $term
bind = $mod SHIFT, Q, killactive
bind = $mod, D, exec, $menu
bind = $mod SHIFT, R, exec, hyprctl reload
bind = $mod SHIFT, E, exit
bind = $mod, End, exec, systemctl poweroff

# Focus and move with Vim directions
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10
bind = $mod, Tab, workspace, previous

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Layout: preselect horizontal/vertical, tabbed groups, and split toggle.
bind = $mod, B, layoutmsg, preselect r
bind = $mod, V, layoutmsg, preselect d
bind = $mod, S, togglegroup
bind = $mod, E, layoutmsg, togglesplit
bind = $mod, F, fullscreen
bind = $mod SHIFT, SPACE, togglefloating
bind = $mod, SPACE, exec, ~/bin/hypr-focus-mode-toggle
# Hyprland has no nested parent containers; keep Alt+A as a tiled-window cycle.
bind = $mod, A, cyclenext, tiled

# Scratchpad
bind = $mod SHIFT, MINUS, movetoworkspacesilent, special:scratchpad
bind = $mod, MINUS, togglespecialworkspace, scratchpad

# Resize mode
bind = $mod, R, submap, resize
submap = resize
binde = , H, resizeactive, -10 0
binde = , J, resizeactive, 0 10
binde = , K, resizeactive, 0 -10
binde = , L, resizeactive, 10 0
bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

# Mouse move/resize, matching Sway's floating modifier.
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Volume and brightness
bindel = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5% && pactl set-sink-mute @DEFAULT_SINK@ 0
bindel = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5% && pactl set-sink-mute @DEFAULT_SINK@ 0
bindl = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindl = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bindl = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Screenshots
bind = , Print, exec, ~/bin/area-screenshot
bind = CONTROL, Print, exec, ~/bin/window-screenshot
bind = $mod, Print, exec, ~/bin/screen-screenshot ~/hdd/Pictures/Screenshots/$(date +%Y-%m-%d-%H-%M-%S).png
bind = $mod SHIFT, C, exec, ~/bin/save-clipboard-picture

# Utilities
bind = CONTROL SHIFT, Escape, exec, $term --class htop-keybind -e htop
bind = $mod SHIFT, B, exec, ~/bin/bgchange_wayland
bind = $mod SHIFT, N, exec, swaync-client -t -sw

### Window rules

windowrule {
    name = float-telegram
    match:class = ^(org.telegram.desktop)$
    float = on
    center = on
    size = 380 504
}

windowrule {
    name = float-htop
    match:class = ^(htop-keybind)$
    float = on
    center = on
}

windowrule {
    name = kitty-opacity
    match:class = ^(kitty)$
    opacity = 0.96 0.90
}

layerrule {
    name = blur-waybar
    match:namespace = waybar
    blur = on
    ignore_alpha = 0.15
}

layerrule {
    name = blur-notifications
    match:namespace = swaync.*
    blur = on
    ignore_alpha = 0.15
}

layerrule {
    name = blur-vicinae
    match:namespace = vicinae
    blur = on
    ignore_alpha = 0.10
}
